spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://127.0.0.1:5432/coal_platform}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
    show-sql: ${SPRING_JPA_SHOW_SQL:false}
    database-platform: ${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.PostgreSQLDialect}

platform:
  iot:
    provider: kepserver
    fallback-to-mock: true
    kepserver:
      enabled: true
      endpoint: opc.tcp://127.0.0.1:49320
      username:
      password:
      source-type: KEPSERVER
      channel-prefix: Channel1
      timeout-ms: 5000
      subscription-interval-ms: 1000
      reconnect-delay-ms: 5000
      max-reconnect-attempts: 0
      batch-write-size: 500
      batch-write-interval-ms: 5000
