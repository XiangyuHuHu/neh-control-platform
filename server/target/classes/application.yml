spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://127.0.0.1:5432/coal_platform}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: ${SPRING_JPA_SHOW_SQL:false}
    database-platform: ${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.PostgreSQLDialect}
    properties:
      hibernate:
        jdbc:
          batch_size: 50
        order_inserts: true
  security:
    user:
      name: ${SPRING_SECURITY_USER_NAME:admin}
      password: ${SPRING_SECURITY_USER_PASSWORD:admin}
  sql:
    init:
      mode: always
      schema-locations: classpath:db/init-core-tables.sql

server:
  port: ${SERVER_PORT:8080}

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.example.platform.entity

platform:
  iot:
    provider: ${IOT_PROVIDER:mock}
    fallback-to-mock: true
    kepserver:
      enabled: ${KEPSERVER_ENABLED:false}
      endpoint: ${KEPSERVER_ENDPOINT:opc.tcp://127.0.0.1:49320}
      username: ${KEPSERVER_USERNAME:}
      password: ${KEPSERVER_PASSWORD:}
      source-type: KEPSERVER
      channel-prefix: ${KEPSERVER_CHANNEL_PREFIX:Channel1}
      timeout-ms: 5000
      subscription-interval-ms: ${KEPSERVER_SUBSCRIPTION_INTERVAL:1000}
      reconnect-delay-ms: ${KEPSERVER_RECONNECT_DELAY:5000}
      max-reconnect-attempts: 0
      batch-write-size: ${KEPSERVER_BATCH_WRITE_SIZE:500}
      batch-write-interval-ms: ${KEPSERVER_BATCH_WRITE_INTERVAL:5000}
      opcua-namespace-index: ${KEPSERVER_OPCUA_NAMESPACE_INDEX:2}
  model-services:
    smart-density:
      enabled: ${SMART_DENSITY_ENABLED:false}
      base-url: ${SMART_DENSITY_BASE_URL:http://127.0.0.1:6789}
      timeout-ms: ${SMART_DENSITY_TIMEOUT_MS:3000}
    smart-reagent:
      enabled: ${SMART_REAGENT_ENABLED:false}
      base-url: ${SMART_REAGENT_BASE_URL:http://127.0.0.1:6788}
      timeout-ms: ${SMART_REAGENT_TIMEOUT_MS:3000}
